server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Alerting service
    location /disaster-management/ {
        proxy_pass http://alerting-service:8093/disaster-management/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Metadata service (THIS FIXES YOUR ERROR)
    location /metadata-api/ {
        proxy_pass http://metadata-handling-service:8092/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MQTT service (add now to avoid future errors)
    location /mqtt-api/ {
        proxy_pass http://mqtt-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}